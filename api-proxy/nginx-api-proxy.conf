# Aurora API Proxy Configuration
# This nginx config forwards requests to external APIs via the Squid proxy
# Deploy this on server3 (or alongside the Aurora container)

# /etc/nginx/sites-available/aurora-api-proxy.conf

server {
    listen 3129;
    server_name _;
    
    # CORS Headers for browser access
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept' always;
    
    # Met.no Weather API
    location /api/metno {
        # Using Squid proxy
        proxy_pass https://api.met.no/weatherapi/locationforecast/2.0/compact;
        proxy_set_header User-Agent "AuroraApp/1.0 github.com/aurora-app";
        proxy_ssl_server_name on;
    }
    
    # TGO Magnetometer (Mock - will need parsing of their text/image format)
    location /api/tgo {
        # TGO doesn't have a clean JSON API, this would need custom parsing
        # For now, return mock data
        default_type application/json;
        return 200 '{"h_component": 12345, "d_component": 67, "z_component": 890, "db_dt": 15.7}';
    }
    
    # NOAA OVATION Aurora Oval
    location /api/ovation {
        proxy_pass https://services.swpc.noaa.gov/json/ovation_aurora_latest.json;
        proxy_ssl_server_name on;
    }
}

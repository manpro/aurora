server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ===========================================
    # STATIC FILES
    # ===========================================
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ===========================================
    # API PROXY ROUTES (Bypass CORS)
    # ===========================================
    
    # NOAA OVATION Aurora Oval (Real-time)
    location /api/ovation {
        proxy_pass https://services.swpc.noaa.gov/json/ovation_aurora_latest.json;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host services.swpc.noaa.gov;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        
        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    }
    
    # NOAA Solar Wind Magnetic Field (Bz)
    location /api/noaa/bz {
        proxy_pass https://services.swpc.noaa.gov/products/summary/solar-wind-mag-field.json;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host services.swpc.noaa.gov;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # NOAA Kp Index
    location /api/noaa/kp {
        proxy_pass https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host services.swpc.noaa.gov;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # Met.no Weather API (requires User-Agent header)
    location /api/weather {
        resolver 8.8.8.8 valid=30s;
        set $metno_host api.met.no;
        proxy_pass https://$metno_host/weatherapi/locationforecast/2.0/compact$is_args$args;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host api.met.no;
        proxy_set_header User-Agent "AuroraFieldApp/2.0 github.com/aurora-app contact@example.com";
        proxy_set_header Accept "application/json";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # TGO Magnetometer (Mock for now - no public JSON API)
    # In production, this would fetch from flux.phys.uit.no and parse it
    location /api/tgo {
        default_type application/json;
        return 200 '{"station": "TRO", "timestamp": "$time_iso8601", "db_dt": 12.5, "source": "mock"}';
    }

    # ===========================================
    # ERROR HANDLING
    # ===========================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
